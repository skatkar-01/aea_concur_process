# ─────────────────────────────────────────────────────────────────────────────
# VENDOR RULES
# Source: Amex_Checklist_2025, vendor_rules.yaml v1.0, Quick_Reference_Guide
#
# IMPORTANT: The LLM prompt says "NEVER MODIFY VENDOR".
# normalize_vendor() in rules_engine.py is currently NOT called by the
# scrubber pipeline (_prepare_transaction does not invoke it).
# These rules are kept as a reference / future opt-in normalisation pass.
# The pay_type cleanup (AmEx CBCP → AmEx) IS active and IS called.
# ─────────────────────────────────────────────────────────────────────────────

# ── Pay type field cleanup (ACTIVE — called by scrubber) ─────────────────────
pay_type:
  find: "American Express Corporate Card CBCP"
  replace: "American Express"


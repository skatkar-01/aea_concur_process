# Car service policy
car_policy:
  early_arrival_cutoff_hour: 7
  early_arrival_cutoff_minute: 0
  work_late_cutoff_hour: 19
  work_late_cutoff_minute: 30
  weekend_days: [Saturday, Sunday]

car_formats:
  work_late: "Work Late/Office-Home"
  early_arrival: "Early Arrival/Home-Office"
  weekend_to_office: "Weekend/Home-Office"
  weekend_from_office: "Weekend/Office-Home"

# Entity tab configuration
entity_tabs:
  AEA: AEA_Posted
  SBF: SBF_Posted
  DEBT: DEBT_Reviewed
  GROWTH: GROWTH_Reviewed

entity_default: AEA

# Pay type replacement
pay_type:
  find: "American Express Corporate Card CBCP"
  replace: "American Express"

# LEN formula
len_overhead: 12
len_limit: 70

# title() output corrections — override what Python's str.title() gets wrong
title_fixes:
  Americet: AmeriVet
  Americvet: AmeriVet
  Numotion: Numotion
  Tricorbraun: TricorBraun
  Trikorbraun: TricorBraun
  Ezcater: Ezcater
